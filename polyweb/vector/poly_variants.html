			    			if (val == 'HG38') { document.getElementById("span_locus_hg38").style.display = "none"; }
			    			else { document.getElementById("span_locus_hg19").style.display = "none"; }
			    		}
			    		
			    		if (key == 'html_mobidetails') { document.getElementById("html_mobidetails").innerHTML = val; }
			    		if (key == 'html_gnomadurl') { document.getElementById("html_gnomadurl").innerHTML = val; }
			    		if (key == 'html_alamuturl') { document.getElementById("html_alamuturl").innerHTML = val; }
			    		if (key == 'html_varsome') { document.getElementById("html_varsome").innerHTML = val; }
			    		if (key == 'html_gnomad') { document.getElementById("html_gnomad").innerHTML = val; }
			    		
			    		if (key == 'html_transcripts') {
			    			document.getElementById("span_html_annot").innerHTML = val;
			    		}
			    		if (key == 'html_dejavu') {
			    			document.getElementById("span_html_dejavu").innerHTML = val;
			    			setTimeout(function() {
			    				end_tasks();
							}, 100);
			    		}
			    		if (key == 'last_dejavu') {
			    			if (val) { 
				    			var list_tmp = val.split(';');
				    			var last_project_name = list_tmp[0];
				    			var last_patient_name = list_tmp[1];
				    			var last_patient_url = list_tmp[2];
				    			var var_locus = list_tmp[3];
				    			launch_web_igv_js(last_project_name,last_patient_name,last_patient_url,var_locus);
			    			}
			    		}
  					});
			    }).fail(function() { alert("ERROR: please contact bioinformatics platform"); });
			}
	    	
	    	function end_tasks() {
				dijit.byId('waiting').hide();
				document.getElementById("panel_results").style.display = "block";
	    		$('#table_dejavu').bootstrapTable();
			}
			
		</script>
